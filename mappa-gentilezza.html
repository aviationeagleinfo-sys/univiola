<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni Viola - Mappa Piemonte</title>
    <link rel="icon" type="image/x-icon" href="/media/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/media/favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Indie+Flower&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --viola-main: #8A2BE2;
            --viola-dark: #4B0082;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            background: linear-gradient(-45deg, #1a0b2e, #4B0082, #8A2BE2, #23a6d5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centratura orizzontale */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* NAVBAR */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }

        .nav-container { width: 90%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo-link { display: flex; align-items: center; text-decoration: none; gap: 12px; }
        .nav-logo-img { height: 45px; width: auto; }
        .nav-logo-text { font-family: 'Indie Flower', cursive; font-size: 1.6rem; font-weight: 800; color: white; }

        .nav-menu { display: flex; gap: 25px; list-style: none; margin: 0; padding: 0; }
        .nav-menu a { text-decoration: none; color: white; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .nav-menu a:hover { color: #d8b4fe; }

        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; z-index: 1100; }
        .hamburger span { width: 30px; height: 3px; background: white; border-radius: 5px; transition: 0.3s; }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-menu {
                position: fixed; top: 0; right: -100%; width: 100%; height: 100vh;
                background: rgba(0, 0, 0, 0.95); flex-direction: column;
                justify-content: center; align-items: center; gap: 40px;
                backdrop-filter: blur(15px); transition: 0.4s;
            }
            .nav-menu.active { right: 0; }
        }

        /* MAIN CONTENT - CENTRATURA OTTIMIZZATA */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 1000px;
            margin: 110px auto 40px auto; /* Centratura automatica e spazio navbar */
            padding: 40px;
            text-align: center;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Indie Flower', cursive;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle { margin-bottom: 30px; font-weight: 300; font-size: 1.1rem; }

        .legenda { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .legenda-item {
            display: flex; align-items: center; gap: 8px; font-size: 0.85rem;
            background: rgba(0,0,0,0.3); padding: 10px 18px; border-radius: 50px;
            border: 1px solid var(--glass-border);
        }
        .color-panchina { color: #8A2BE2; }
        .color-scuola { color: #0096FF; }
        .color-poi { color: #FF8C00; }

        /* MAPPA */
        #map-container { 
            width: 100%; 
            height: 550px; /* Altezza fissa per stabilità */
            border-radius: 20px; 
            overflow: hidden; 
            border: 2px solid var(--glass-border); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            z-index: 1;
        }
        #map { width: 100%; height: 100%; }

        .btn-back {
            background: rgba(255,255,255,0.2); color: white; text-decoration: none;
            padding: 12px 28px; border-radius: 50px; font-weight: 600;
            border: 1px solid var(--glass-border); transition: all 0.3s ease;
            margin-bottom: 20px; align-self: flex-start;
        }
        .btn-back:hover { background: rgba(255,255,255,0.4); transform: translateX(-5px); }

        footer { width: 100%; text-align: center; padding: 25px; background: rgba(0, 0, 0, 0.4); font-size: 0.85rem; margin-top: auto; }
        
        /* Correzione per i PopUp della mappa per non rompere il tema */
        .leaflet-popup-content-wrapper { background: rgba(26, 11, 46, 0.9) !important; color: white !important; border: 1px solid var(--viola-main); }
        .leaflet-popup-tip { background: rgba(26, 11, 46, 0.9) !important; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo-link">
                <img src="/media/UniviolaLogoFull.png" alt="Logo Uni Viola" class="nav-logo-img">
                <span class="nav-logo-text">UniViola</span>
            </a>
            <div class="hamburger"><span></span><span></span><span></span></div>
            <ul class="nav-menu">
                <li><a href="progetto.html">Il Progetto</a></li>
                <li><a href="#">Podcast</a></li>
                <li><a href="mappa-gentilezza.html">Mappa</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="risorse.html">Risorse</a></li>
            </ul>
        </div>
    </nav>

    <main class="glass-panel">
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Ritorna alla Base</a>
        
        <h1>La Rete della Gentilezza</h1>
        <p class="subtitle">Esplora i luoghi simbolo del nostro avamposto a Cuneo.</p>

        <div class="legenda">
            <div class="legenda-item"><i class="fas fa-couch color-panchina"></i> Panchine Viola</div>
            <div class="legenda-item"><i class="fas fa-graduation-cap color-scuola"></i> Scuole</div>
            <div class="legenda-item"><i class="fas fa-star color-poi"></i> Punti di Interesse</div>
        </div>

        <div id="map-container">
            <div id="map"></div>
        </div>
    </main>

    <footer>Progetto sviluppato per il Concorso "Contrapposizione al Bullismo"</footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        const hamburger = document.querySelector(".hamburger");
        const navMenu = document.querySelector(".nav-menu");
        hamburger.addEventListener("click", () => {
            hamburger.classList.toggle("active");
            navMenu.classList.toggle("active");
        });

        // Inizializzazione Mappa (Centrata su Cuneo/Piemonte)
        var map = L.map('map').setView([44.5, 7.6], 9);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        function createCustomPin(color, iconClass) {
            return L.divIcon({
                className: 'custom-pin',
                html: `<div style="background-color: ${color}; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); color: white;">
                         <i class="${iconClass}"></i>
                       </div>`,
                iconSize: [34, 34],
                iconAnchor: [17, 17],
                popupAnchor: [0, -15]
            });
        }

        // Marker Database
        const markers = [
            { pos: [44.389547, 7.547919], icon: createCustomPin('#FF8C00', 'fas fa-star'), txt: "<b>Piazza Galimberti</b><br>Il cuore di Cuneo." },
            { pos: [44.388395, 7.567114], icon: createCustomPin('#8A2BE2', 'fas fa-couch'), txt: "<b>💜 Panchina Viola</b><br>Simbolo contro il bullismo." },
            { pos: [44.388726, 7.566091], icon: createCustomPin('#0096FF', 'fas fa-graduation-cap'), txt: "<b>IC BSG</b><br>Scuola partner Uni Viola." },
            { pos: [44.393219, 7.5510855], icon: createCustomPin('#2c4865', 'fas fa-landmark'), txt: "<b>Comune di Cuneo</b>" },
            { pos: [44.395654, 7.552566], icon: createCustomPin('#000e8f', 'fas fa-building-shield'), txt: "<b>Questura di Cuneo</b>" },
            { pos: [44.38514, 7.5336596], icon: createCustomPin('#de0000', 'fas fa-star-of-life'), txt: "<b>Ospedale Santa Croce</b>" }
        ];

        markers.forEach(m => L.marker(m.pos, {icon: m.icon}).addTo(map).bindPopup(m.txt));
    </script>
</body>
</html>
