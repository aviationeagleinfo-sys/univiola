<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni Viola - Mappa di Cuneo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Indie+Flower&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --viola-main: #8A2BE2;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(-45deg, #1a0b2e, #4B0082, #8A2BE2, #23a6d5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            padding: 40px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-family: 'Indie Flower', cursive;
            font-size: 3.5rem;
            margin: 10px 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            margin-bottom: 30px;
            font-weight: 300;
            font-size: 1.1rem;
        }

        /* Legenda */
        .legenda {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .legenda-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }

        .legenda-item i { font-size: 1.2rem; }
        .color-panchina { color: #8A2BE2; }
        .color-scuola { color: #0096FF; }
        .color-poi { color: #FF8C00; }

        /* Contenitore della Mappa */
        #map-container {
            flex-grow: 1;
            min-height: 500px;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Aggiunto per forzare il riempimento del figlio */
            display: flex; 
        }

        #map {
            width: 100%;
            min-height: 500px; /* IL FIX È QUI */
            flex-grow: 1;
            z-index: 1;
        }

        /* Stile personalizzato per i Popup della mappa */
        .leaflet-popup-content-wrapper {
            border-radius: 15px;
            font-family: 'Montserrat', sans-serif;
            color: #333;
        }

        /* Navigazione */
        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            display: inline-block;
            margin-bottom: 20px;
            align-self: flex-start;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.4);
            transform: translateX(-5px);
        }

        footer {
            margin-top: auto;
            width: 100%;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            font-size: 0.85rem;
        }
    

        footer a { color: #d8b4fe; font-weight: 600; text-decoration: none; }
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-container {
            width: 90%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'Indie Flower', cursive;
            font-size: 1.5rem;
            font-weight: 800;
            text-decoration: none;
            color: white;
        }

        .nav-menu {
            display: flex;
            gap: 25px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-menu a {
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .nav-menu a:hover {
            color: #d8b4fe;
        }
    </style>
</head>
<body>
<nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">UniViola</a>
            <ul class="nav-menu">
                
                <li><a href="#">Il Progetto</a></li>
                <li><a href="#">Podcast</a></li>
                <li><a href="#">Mappa gentilezza</a></li>
            </ul>
        </div>
    </nav>
    <main class="glass-panel">
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Ritorna alla Base</a>
        
        <h1>La Rete della Gentilezza</h1>
        <p class="subtitle">Esplora i luoghi simbolo del nostro avamposto a Cuneo.</p>

        <div class="legenda">
            <div class="legenda-item"><i class="fas fa-couch color-panchina"></i> Panchine Viola</div>
            <div class="legenda-item"><i class="fas fa-graduation-cap color-scuola"></i> Scuole</div>
            <div class="legenda-item"><i class="fas fa-star color-poi"></i> Punti di Interesse</div>
        </div>

        <div id="map-container">
            <div id="map"></div>
        </div>
    </main>

    <footer>
        Progetto sviluppato per il Concorso "Contrapposizione al Bullismo"<br>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // 1. Inizializza la mappa su Cuneo
        var map = L.map('map').setView([44.7416596, 7.6983000], 9);

        // 2. Aggiunge la cartografia
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors - Aviation Eagle'
        }).addTo(map);

        // 3. Funzione generatrice di icone HTML
        function createCustomPin(color, iconClass) {
            return L.divIcon({
                className: 'custom-pin',
                html: `<div style="background-color: ${color}; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.4); color: white; font-size: 16px;">
                         <i class="${iconClass}"></i>
                       </div>`,
                iconSize: [42, 42],
                iconAnchor: [21, 21], 
                popupAnchor: [0, -20]
            });
        }

        // 4. Setup dei 3 modelli di icona
        var iconaPanchina = createCustomPin('#8A2BE2', 'fas fa-couch');      // Viola
        var iconaScuola = createCustomPin('#0096FF', 'fas fa-graduation-cap'); // Azzurro
        var iconaPoi = createCustomPin('#FF8C00', 'fas fa-star');          // Arancione
        var iconaGov = createCustomPin('#2c4865', 'fas fa-landmark'); 
        var iconaSafe = createCustomPin('#75b000', 'fas fa-user-shield');
        var iconaPolice = createCustomPin('#000e8f', 'fas fa-building-shield');
        var icona112 = createCustomPin('#de0000', 'fas fa-star-of-life' );


        // =====================================================================
        // --- AGGIUNGI I TUOI PIN QUI ---
        // =====================================================================

        L.marker([44.389547, 7.547919], {icon: iconaPoi})
            .addTo(map)
            .bindPopup("<b>Piazza Galimberti</b><br>Il cuore pulsante di Cuneo.");

        L.marker([44.388395, 7.567114], {icon: iconaPanchina})
            .addTo(map)
            .bindPopup("<b>💜 Panchina Viola</b><br>Il nostro primo avamposto contro il bullismo.");

        L.marker([44.388726, 7.566091], {icon: iconaScuola})
            .addTo(map)
            .bindPopup("<b>IC BSG</b><br>Scuola partner del progetto Uni Viola.");
            
L.marker([44.393219,7.5510855], {icon: iconaGov})
            .addTo(map)
            .bindPopup("<b>Comune di Cuneo</b><br>Partner ufficiale del concorso.");
            
            L.marker([45.073103, 7.681251], {icon: iconaGov})
            .addTo(map)
            .bindPopup("<b>Comune di Torino</b><br>Un luogo sicuro per tutti.");
            
            L.marker([45.193964, 7.649319], {icon: iconaSafe})
            .addTo(map)
            .bindPopup("<b>Aeroporto di Torino</b><br>Recati qui se puoi e ne hai bisogno.");
            
            L.marker([44.395654, 7.552566], {icon: iconaPolice})
            .addTo(map)
            .bindPopup("<b>Questura di Cuneo</b><br>Recati qui se puoi e ne hai bisogno.");
            
            L.marker([44.38514,7.5336596], {icon: icona112})
            .addTo(map)
            .bindPopup("<b>Ospedale</b><br>Ospedale Santa Croce, vieni a chiedere aiuto SOLO se sei in pericolo immediato. Ad Esempio se qualcuno ti minaccia di ferirti (MAGARI HA UN COLTELLO...). NON Infastidire il personale. Sii responsabile.");
            
            L.marker([45.05175001608306, 7.665638769244943], {icon: icona112})
            .addTo(map)
            .bindPopup("<b>Ospedale</b><br>Ospedale Mauriziano, vieni a chiedere aiuto SOLO se sei in pericolo immediato. Ad Esempio se qualcuno ti minaccia di ferirti (MAGARI HA UN COLTELLO...). NON Infastidire il personale. Sii responsabile.");
            
            L.marker([45.033303217902905, 7.674623011871491], {icon: icona112})
            .addTo(map)
            .bindPopup("<b>Ospedale</b><br>Ospedale CTO, vieni a chiedere aiuto SOLO se sei in pericolo immediato. Ad Esempio se qualcuno ti minaccia di ferirti (MAGARI HA UN COLTELLO...). NON Infastidire il personale. Sii responsabile.");
            
            L.marker([45.03434555174385, 7.674839687159111], {icon: icona112})
            .addTo(map)
            .bindPopup("<b>Ospedale</b><br>Ospedale Regina Margherita, vieni a chiedere aiuto SOLO se sei in pericolo immediato. Ad Esempio se qualcuno ti minaccia di ferirti (MAGARI HA UN COLTELLO...). NON Infastidire il personale. Sii responsabile." );
            
            L.marker([45.041360811525934, 7.674254482955641], {icon: icona112})
            .addTo(map)
            .bindPopup("<b>Ospedale</b><br>Ospedale Molinette, vieni a chiedere aiuto SOLO se sei in pericolo immediato. Ad Esempio se qualcuno ti minaccia di ferirti (MAGARI HA UN COLTELLO...). NON Infastidire il personale. Sii responsabile." );
    </script>
</body>
</html>
