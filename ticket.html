<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni Viola - Terminale Aztec Cloud v2.6</title>
    
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.0.4/dist/bwip-js-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link rel="icon" type="image/x-icon" href="/media/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Indie+Flower&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --viola-main: #8A2BE2;
            --viola-dark: #4B0082;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(-45deg, #1a0b2e, #4B0082, #8A2BE2, #23a6d5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white; display: flex; justify-content: center; align-items: center;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #login-gate {
            background: var(--glass-bg); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 30px; border: 1px solid var(--glass-border);
            text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #admin-panel { display: none; width: 95%; max-width: 1100px; margin: 20px; }
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border-radius: 25px; border: 1px solid var(--glass-border);
            padding: 30px; margin-bottom: 20px;
        }
        h1, h2 { font-family: 'Indie Flower', cursive; color: white; margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3);
            color: white; font-size: 1rem; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 15px; border-radius: 50px; border: none;
            background: var(--viola-main); color: white; font-weight: 800;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px;
        }
        button:hover { background: var(--viola-dark); transform: scale(1.02); }
        .btn-report { background: #17a2b8; }
        .btn-pdf { background: #343a40; border: 2px solid white; }
        .btn-check { background: #ffc107; color: #1a1a1a; }
        #log-area {
            background: rgba(0,0,0,0.4); border-radius: 10px; padding: 15px;
            height: 100px; overflow-y: auto; font-family: monospace; font-size: 0.8rem;
            border: 1px solid var(--viola-main); color: #d8b4fe; margin-top: 10px;
        }
        .pax-entry {
            display: grid; grid-template-columns: 2fr 1fr; gap: 10px;
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-bottom: 5px;
        }
        .aztec-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; justify-content: center; }
        .aztec-item { 
            background: white; padding: 15px; border-radius: 10px; 
            text-align: center; color: black; width: 150px; 
        }
        canvas { width: 120px; height: 120px; display: block; margin: 0 auto; }
        .code-label { font-size: 8px; font-weight: bold; margin-top: 10px; color: black; }
        
        /* Stili per il Modal del Report */
        #report-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #2d144d; padding: 30px; border-radius: 20px; 
            width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto;
        }
        .report-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .btn-del-single { background: #ff4757; padding: 5px 10px; font-size: 0.7rem; width: auto; margin: 0; }

        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-gate">
        <h1>Uni Viola Access</h1>
        <p>Inserire Protocollo di Sicurezza</p>
        <input type="password" id="psw-input" placeholder="Password...">
        <button id="btn-login">Inizializza</button>
    </div>

    <main id="admin-panel">
        <h1 style="text-align: center; font-size: 2.5rem;">Terminale Aztec UniViola v2.6</h1>
        
        <div class="grid">
            <div class="glass-card">
                <h2>Emissione Multipla</h2>
                <label>Quantità Biglietti:</label>
                <input type="number" id="pax-count" value="1" min="1" max="10">
                <div id="pax-inputs-container"></div>
                <button id="btn-generate">Genera e Registra Cloud</button>
                <button id="pdf-btn" class="btn-pdf" style="display:none;">⬇️ Scarica PDF (Layout A5)</button>
                <div id="log-area">Sincronizzazione Cloud...</div>
                <div class="aztec-grid" id="aztec-container"></div>
            </div>

            <div class="glass-card">
                <h2>Verifica & Check-in</h2>
                <button class="btn-report" id="btn-open-report">📊 Gestisci Database</button>
                <div style="margin-top: 20px;">
                    <input type="text" id="scan-input" placeholder="SCANSIONE IN CORSO..." autocomplete="off">
                    <button class="btn-check" id="btn-verify">Conferma Ingresso</button>
                </div>
                <div id="status-box" style="padding:15px; border-radius:10px; margin-top:15px; display:none; text-align:center; font-weight: bold;"></div>
                <div style="margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 15px;">
                    <p id="stat-text">Caricamento...</p>
                    <button id="btn-reset" style="background: #dc3545; font-size: 0.7rem; width: auto;">Reset Totale</button>
                </div>
            </div>
        </div>
    </main>

    <div id="report-modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Registro Biglietti</h2>
                <button onclick="document.getElementById('report-modal').style.display='none'" style="width:40px; padding:5px;">X</button>
            </div>
            <div id="report-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5232bpf2y4pKwBq2_lEICUU6wPnVnEeg",
            authDomain: "univiola-ee9b2.firebaseapp.com",
            databaseURL: "https://univiola-ee9b2-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "univiola-ee9b2",
            storageBucket: "univiola-ee9b2.firebasestorage.app",
            messagingSenderId: "540543531950",
            appId: "1:540543531950:web:00e3e03c69eb74af8aa63f",
            measurementId: "G-97C43J78TV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const MASTER_PSW = "UNIVIOLA2026";
        const LOGO_URL = "https://univiola.aviationeagle.co.uk/media/UniviolaLogoNoSfondo.png";
        let allTickets = {};
        let currentBatch = [];

        document.getElementById('btn-login').onclick = checkAccess;
        document.getElementById('pax-count').onchange = renderPaxInputs;
        document.getElementById('btn-generate').onclick = generateAztec;
        document.getElementById('pdf-btn').onclick = downloadPDF;
        document.getElementById('btn-open-report').onclick = openReport;
        document.getElementById('btn-verify').onclick = verifyTicket;
        document.getElementById('btn-reset').onclick = clearSystem;

        onValue(ref(db, 'tickets/'), (snapshot) => {
            allTickets = snapshot.val() || {};
            updateStats();
            if(document.getElementById('report-modal').style.display === 'flex') renderReportList();
        });

        function checkAccess() {
            if(document.getElementById('psw-input').value === MASTER_PSW) {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                renderPaxInputs();
            } else { alert("Protocollo errato."); }
        }

        function renderPaxInputs() {
            const count = document.getElementById('pax-count').value;
            const container = document.getElementById('pax-inputs-container');
            container.innerHTML = "";
            for(let i=0; i<count; i++) {
                container.innerHTML += `
                    <div class="pax-entry">
                        <input type="text" class="pax-name-input" placeholder="Nome Titolare ${i+1}">
                        <select class="pax-type-input">
                            <option value="ADULTO">Adulto</option>
                            <option value="MINORENNE">Minorenne</option>
                        </select>
                    </div>`;
            }
        }

        function generateAztec() {
            const names = document.querySelectorAll('.pax-name-input');
            const types = document.querySelectorAll('.pax-type-input');
            const container = document.getElementById('aztec-container');
            container.innerHTML = "";
            currentBatch = [];

            names.forEach((el, index) => {
                const name = el.value.toUpperCase() || `OSPITE${index+1}`;
                const type = types[index].value;
                const rand = Math.random().toString(36).substr(2, 5).toUpperCase();
                const code = `UV${rand}${name.substring(0,3).replace(/[^A-Z0-9]/g, '')}`;
                
                const ticketObj = { code, name, type, date: new Date().toLocaleString(), used: false };
                push(ref(db, 'tickets/'), ticketObj);
                currentBatch.push(ticketObj);

                const div = document.createElement('div');
                div.className = 'aztec-item';
                const canvas = document.createElement('canvas');
                canvas.id = `canvas-id-${index}`;
                div.appendChild(canvas);
                const labelInfo = document.createElement('div');
                labelInfo.className = 'code-label';
                labelInfo.innerHTML = `${name}<br><b>${code}</b>`;
                div.appendChild(labelInfo);
                container.appendChild(div);

                setTimeout(() => {
                    bwipjs.toCanvas(`canvas-id-${index}`, { bcid: 'azteccode', text: code, scale: 4, padding: 2 });
                }, 100);
            });
            document.getElementById('pdf-btn').style.display = 'block';
        }

        function verifyTicket() {
            const input = document.getElementById('scan-input');
            const code = input.value.trim().toUpperCase();
            const box = document.getElementById('status-box');
            box.style.display = 'block';

            let ticketKey = Object.keys(allTickets).find(key => allTickets[key].code === code);

            if(!ticketKey) {
                box.textContent = "❌ CODICE INESISTENTE";
                box.style.background = "#dc3545";
            } else if(allTickets[ticketKey].used) {
                box.textContent = `⚠️ GIÀ USATO: ${allTickets[ticketKey].name}`;
                box.style.background = "#fd7e14";
            } else {
                box.textContent = `✅ ACCESSO: ${allTickets[ticketKey].name}`;
                box.style.background = "#28a745";
                update(ref(db, `tickets/${ticketKey}`), { used: true });
            }
            input.value = "";
        }

        function updateStats() {
            const list = Object.values(allTickets);
            const used = list.filter(t => t.used).length;
            document.getElementById('stat-text').innerHTML = `<b>Attivi:</b> ${list.length} | <b>Ingressi:</b> ${used}`;
        }

        function openReport() {
            document.getElementById('report-modal').style.display = 'flex';
            renderReportList();
        }

        function renderReportList() {
            const container = document.getElementById('report-list');
            container.innerHTML = "";
            
            // Ordiniamo per data (i più recenti in alto)
            const entries = Object.entries(allTickets).reverse();

            entries.forEach(([key, t]) => {
                const div = document.createElement('div');
                div.className = 'report-item';
                div.innerHTML = `
                    <span>${t.used ? '✅' : '⚪'} <b>${t.code}</b> - ${t.name}</span>
                    <button class="btn-del-single" data-key="${key}">ELIMINA</button>
                `;
                container.appendChild(div);
            });

            // Listener per bottoni elimina singoli
            document.querySelectorAll('.btn-del-single').forEach(btn => {
                btn.onclick = (e) => {
                    const key = e.target.getAttribute('data-key');
                    if(confirm("Eliminare definitivamente questo codice dal cloud?")) {
                        remove(ref(db, `tickets/${key}`));
                    }
                };
            });
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const logoBase64 = await getBase64Image(LOGO_URL);

            for (let i = 0; i < currentBatch.length; i++) {
                const ticket = currentBatch[i];
                const isEven = i % 2 !== 0;
                if (i > 0 && !isEven) doc.addPage();
                const startY = isEven ? 148.5 : 0;
                
                doc.setDrawColor(0); doc.setLineWidth(0.8);
                doc.rect(10, startY + 10, 190, 128.5); 
                if(logoBase64) doc.addImage(logoBase64, 'PNG', 15, startY + 13, 18, 18);
                doc.setFont("helvetica", "bold"); doc.setFontSize(24);
                doc.text("UNI VIOLA", 40, startY + 23);
                doc.setFontSize(14); doc.text("TITOLARE:", 20, startY + 55);
                doc.setFont("helvetica", "normal"); doc.text(ticket.name, 65, startY + 55);
                
                const canvas = document.getElementById(`canvas-id-${i}`);
                if (canvas) {
                    const imgData = canvas.toDataURL('image/png');
                    doc.addImage(imgData, 'PNG', 135, startY + 55, 50, 50);
                }
                doc.setFontSize(10); doc.text(ticket.code, 160, startY + 115, { align: "center" });
            }
            doc.save(`Tickets_UniViola_v2.6.pdf`);
        }

        function getBase64Image(url) {
            return new Promise((resolve) => {
                const img = new Image(); img.setAttribute('crossOrigin', 'anonymous');
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext("2d"); ctx.drawImage(img, 0, 0);
                    resolve(canvas.toDataURL("image/png"));
                };
                img.onerror = () => resolve(null); img.src = url;
            });
        }

        function clearSystem() {
            if(confirm("ATTENZIONE: Stai per cancellare l'intero database globale. Continuare?")) {
                remove(ref(db, 'tickets/')).then(() => { location.reload(); });
            }
        }
    </script>
</body>
</html>
